name: Generate Snake and Stats

on:
  schedule:
    # Runs every 12 hours
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Setup directories
      - name: Create dist and assets directories
        run: mkdir -p dist/assets

      # 2. Generate Contribution Snake
      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=white&color_dots=%23161b22,%230d306b,%230060b8,%231f8cff,%23a6dfff
            dist/github-contribution-grid-snake-dark.svg?color_snake=white&color_dots=%23161b22,%230d306b,%230060b8,%231f8cff,%23a6dfff
          github_token: ${{ secrets.PERSONAL_TOKEN }}

      # 3. Generate Streak Stats
      - name: Generate Streak Stats Card
        uses: be-next/github-streak-stats-action@v1
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.PERSONAL_TOKEN }}
          output-path: dist/assets/github-streak-stats.svg
          background: 0d1117
          stroke: 58a6ff
          ring: 58a6ff
          fire: 58a6ff
          currStreakNum: 58a6ff
          sideNums: 58a6ff
          currStreakLabel: 58a6ff
          sideLabels: c9d1d9
          dates: c9d1d9
          hide-border: false

      # 4. Clone github-readme-stats, run locally, and generate cards
      - name: Checkout github-readme-stats
        uses: actions/checkout@v4
        with:
          repository: anuraghazra/github-readme-stats
          path: temp-github-readme-stats

      - name: Install & Run local github-readme-stats
        run: |
          cd temp-github-readme-stats
          npm install
          PORT=9000 PAT_1=${{ secrets.PERSONAL_TOKEN }} node express.js &
          sleep 10
        shell: bash

      - name: Download Stats and Languages SVGs
        run: |
          curl "http://localhost:9000/api?username=${{ github.repository_owner }}&show_icons=true&hide_border=false&bg_color=0d1117&title_color=58a6ff&icon_color=58a6ff&text_color=c9d1d9&border_color=58a6ff&rank_icon=github&hide=contribs" -o dist/assets/github-readme-stats.svg
          curl "http://localhost:9000/api/top-langs/?username=${{ github.repository_owner }}&layout=pie&langs_count=10&hide_border=false&bg_color=0d1117&title_color=58a6ff&text_color=c9d1d9&border_color=58a6ff&card_width=350&count_private=true" -o dist/assets/github-top-langs.svg
        shell: bash

      # 5. Push all generated assets to Output Branch
      - name: Push Assets to Output Branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
