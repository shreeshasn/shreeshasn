<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180" fill="none">
  <defs>
    <!-- Background Gradient - Dark -->
    <linearGradient id="bg-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    
    <!-- Border Gradient - Dark -->
    <linearGradient id="border-grad-dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#58a6ff" />
    </linearGradient>
    
    <!-- Title Text Gradient - Dark -->
    <linearGradient id="title-grad-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58a6ff" />
      <stop offset="100%" stop-color="#85b9ff" />
    </linearGradient>
    
    <!-- Background Gradient - Light -->
    <linearGradient id="bg-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f6f8fa" />
    </linearGradient>
    
    <!-- Border Gradient - Light -->
    <linearGradient id="border-grad-light" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#0969da" />
    </linearGradient>
    
    <!-- Title Text Gradient - Light -->
    <linearGradient id="title-grad-light" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0969da" />
      <stop offset="100%" stop-color="#218bff" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <style>
    /* Default / Dark Mode styles */
    .card-rect { fill: url(#bg-grad-dark); stroke: url(#border-grad-dark); }
    .title-text { fill: url(#title-grad-dark); }
    .badge-rect { fill: #0f172a; stroke: #1f6feb; }
    .badge-text { fill: #58a6ff; }
    .sep-line { stroke: #1f2937; }
    .desc-text { color: #9ca3af; }
    #shadow feDropShadow { flood-opacity: 0.5; }
    
    @media (prefers-color-scheme: light) {
      .card-rect { fill: url(#bg-grad-light); stroke: url(#border-grad-light); }
      .title-text { fill: url(#title-grad-light); }
      .badge-rect { fill: #eff6ff; stroke: #bfdbfe; }
      .badge-text { fill: #0969da; }
      .sep-line { stroke: #cbd5e1; }
      .desc-text { color: #4b5563; }
      #shadow feDropShadow { flood-opacity: 0.1; }
    }
  </style>

  <!-- Card Body -->
  <rect class="card-rect" x="2" y="2" width="396" height="176" rx="14" stroke-width="2" filter="url(#shadow)" />

  <!-- Title -->
  <text class="title-text" x="24" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700">🔍 Audita</text>

  <!-- Status / Role Badge -->
  <rect class="badge-rect" x="290" y="16" width="86" height="22" rx="11" stroke-width="1" />
  <text class="badge-text" x="333" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Live · Solo</text>

  <!-- Separator line -->
  <line class="sep-line" x1="24" y1="52" x2="376" y2="52" stroke-width="1" />

  <!-- Description -->
  <foreignObject x="24" y="64" width="352" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" class="desc-text" style="font-family: system-ui, -apple-system, sans-serif; font-size: 13px; line-height: 1.5; font-weight: 400; margin: 0; padding: 0;">
      GitHub repository health auditor built with reactive architecture and intelligent caching.
    </div>
  </foreignObject>

  <!-- Tech Stack Badges -->
  <g transform="translate(0, 136)">
    <!-- Spring Boot -->
    <rect class="badge-rect" x="24" y="0" width="75" height="20" rx="6" stroke-width="1" />
    <text class="badge-text" x="61" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Spring Boot</text>

    <!-- Java -->
    <rect class="badge-rect" x="107" y="0" width="44" height="20" rx="6" stroke-width="1" />
    <text class="badge-text" x="129" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">Java</text>

    <!-- React -->
    <rect class="badge-rect" x="159" y="0" width="48" height="20" rx="6" stroke-width="1" />
    <text class="badge-text" x="183" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">React</text>

    <!-- GitHub API -->
    <rect class="badge-rect" x="215" y="0" width="76" height="20" rx="6" stroke-width="1" />
    <text class="badge-text" x="253" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" text-anchor="middle">GitHub API</text>
  </g>
</svg>
