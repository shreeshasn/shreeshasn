<svg xmlns="http://www.w3.org/2000/svg" width="400" height="180" viewBox="0 0 400 180" fill="none">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    
    <!-- Border Gradient: Dark Blue to Ocean Blue -->
    <linearGradient id="border-grad-vox" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="100%" stop-color="#0969da" />
    </linearGradient>
    
    <!-- Title Text Gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0969da" />
      <stop offset="100%" stop-color="#1f88ff" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Card Body -->
  <rect x="2" y="2" width="396" height="176" rx="14" fill="url(#bg-grad)" stroke="url(#border-grad-vox)" stroke-width="2" filter="url(#shadow)" />

  <!-- Title -->
  <text x="24" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="700" fill="url(#title-grad)">🎙️ VoxGlobal AI</text>

  <!-- Status / Role Badge -->
  <rect x="275" y="16" width="101" height="22" rx="11" fill="#f0f6ff" stroke="#b4d3fe" stroke-width="1" />
  <text x="325.5" y="30" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#0969da" text-anchor="middle">WIP · Team Lead</text>

  <!-- Separator line -->
  <line x1="24" y1="52" x2="376" y2="52" stroke="#e5e7eb" stroke-width="1" />

  <!-- Description -->
  <foreignObject x="24" y="64" width="352" height="60">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-family: system-ui, -apple-system, sans-serif; font-size: 13px; color: #57606a; line-height: 1.5; font-weight: 400; margin: 0; padding: 0;">
      AI cinematic dubbing platform. Redis Streams pub/sub, pgvector speaker biometrics, CI/CD monorepo.
    </div>
  </foreignObject>

  <!-- Tech Stack Badges -->
  <g transform="translate(0, 136)">
    <!-- FastAPI -->
    <rect x="24" y="0" width="58" height="20" rx="6" fill="#f3f4f6" stroke="#cbd5e1" stroke-width="1" />
    <text x="53" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#24292f" text-anchor="middle">FastAPI</text>

    <!-- Next.js -->
    <rect x="90" y="0" width="58" height="20" rx="6" fill="#f3f4f6" stroke="#cbd5e1" stroke-width="1" />
    <text x="119" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#24292f" text-anchor="middle">Next.js</text>

    <!-- Redis -->
    <rect x="156" y="0" width="48" height="20" rx="6" fill="#f3f4f6" stroke="#cbd5e1" stroke-width="1" />
    <text x="180" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#24292f" text-anchor="middle">Redis</text>

    <!-- PostgreSQL -->
    <rect x="212" y="0" width="80" height="20" rx="6" fill="#f3f4f6" stroke="#cbd5e1" stroke-width="1" />
    <text x="252" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#24292f" text-anchor="middle">PostgreSQL</text>

    <!-- Docker -->
    <rect x="300" y="0" width="54" height="20" rx="6" fill="#f3f4f6" stroke="#cbd5e1" stroke-width="1" />
    <text x="327" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#24292f" text-anchor="middle">Docker</text>
  </g>
</svg>
